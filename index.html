<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中西區人口尋跡 · HK Population Trail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0b07;
  --surface:#1a1510;
  --surface2:#22201a;
  --border:#2e2920;
  --red:#d4341a;
  --red2:#ff5a3c;
  --gold:#c9972a;
  --gold2:#f0c050;
  --cream:#f0ead8;
  --muted:#7a6e5c;
  --text:#e8e0cc;
  --green:#2d7a4a;
  --green2:#4aad6e;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif}

/* ───── SPLASH ───── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 28px;text-align:center;
  transition:opacity .6s ease, transform .6s ease;
}
#splash.out{opacity:0;transform:scale(1.04);pointer-events:none}
.splash-eyebrow{
  font-size:10px;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold);margin-bottom:18px;
  border:1px solid rgba(201,151,42,.3);padding:5px 14px;border-radius:20px;
}
.splash-title{
  font-family:'DM Serif Display',serif;
  font-size:clamp(28px,8vw,42px);
  line-height:1.15;color:var(--cream);margin-bottom:6px;
}
.splash-title em{font-style:italic;color:var(--gold2)}
.splash-sub{
  font-family:'Noto Serif TC',serif;
  font-size:clamp(15px,4vw,19px);color:var(--muted);
  margin-bottom:28px;line-height:1.5;
}
.splash-stats{display:flex;gap:28px;justify-content:center;margin-bottom:32px}
.stat{display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-val{font-family:'DM Serif Display',serif;font-size:28px;color:var(--cream)}
.stat-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.splash-desc{
  max-width:360px;font-size:13px;line-height:1.85;color:var(--muted);margin-bottom:32px;
}
.btn-start{
  background:var(--red);color:#fff;border:none;border-radius:12px;
  padding:15px 44px;
  font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;letter-spacing:2px;
  cursor:pointer;transition:all .2s;
  box-shadow:0 0 32px rgba(212,52,26,.4);
}
.btn-start:active{transform:scale(.97)}

/* ───── APP SHELL ───── */
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ───── HEADER ───── */
#header{
  flex-shrink:0;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:10px 14px;
  display:flex;align-items:center;justify-content:space-between;
  z-index:100;
}
.hdr-left h1{
  font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;
  color:var(--cream);letter-spacing:1px;line-height:1.2;
}
.hdr-left p{font-size:9px;color:var(--muted);letter-spacing:1.5px;margin-top:2px}
#progressPill{
  background:var(--red);color:#fff;font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:20px;white-space:nowrap;letter-spacing:.5px;
  transition:background .4s;
}
#progressPill.done{background:var(--green)}

/* ───── BODY ───── */
#body{flex:1;display:flex;overflow:hidden;position:relative}

/* ───── MAP ───── */
#mapWrap{flex:1;position:relative;overflow:hidden}
#mapSvg{width:100%;height:100%;display:block}

/* SVG map styles */
.road-major{stroke:#2e2820;stroke-width:10;fill:none;stroke-linecap:round}
.road-minor{stroke:#252018;stroke-width:5;fill:none;stroke-linecap:round}
.road-label{fill:#4a4030;font-size:7.5px;font-family:'Noto Sans TC',sans-serif}
.area-label{fill:#3a3020;font-size:10px;font-family:'Noto Serif TC',serif;font-weight:700}
.area-label-en{fill:#3a3020;font-size:8px;font-family:'DM Serif Display',serif;font-style:italic}
.water-label{fill:#1a3a50;font-size:11px;font-family:'DM Serif Display',serif;font-style:italic}
.tram-line{stroke:#2d4a2d;stroke-width:3;fill:none;opacity:.8}
.mtr-badge{fill:#8b0000;rx:3}
.trail-path{
  stroke:var(--red);stroke-width:2.5;fill:none;
  stroke-dasharray:8,5;opacity:.6;
  animation:dash 20s linear infinite;
}
@keyframes dash{to{stroke-dashoffset:-200}}

/* markers */
.pin-ring{
  fill:none;stroke:var(--muted);stroke-width:1.5;
  transition:stroke .2s;
}
.pin-dot{fill:var(--surface2);transition:fill .2s}
.pin-emoji{font-size:14px;dominant-baseline:central;text-anchor:middle;
  transition:font-size .2s;user-select:none}
.pin-name{
  fill:var(--muted);font-size:8px;
  font-family:'Noto Sans TC',sans-serif;font-weight:500;
  text-anchor:middle;
  transition:fill .2s;
}
.pin-group{cursor:pointer}
.pin-group:hover .pin-ring,.pin-group.active .pin-ring{stroke:var(--red2)}
.pin-group:hover .pin-dot,.pin-group.active .pin-dot{fill:#1e1008}
.pin-group:hover .pin-name,.pin-group.active .pin-name{fill:var(--cream)}
.pin-group.completed .pin-ring{stroke:var(--green2)}
.pin-group.completed .pin-dot{fill:#0a1a0e}
.pin-group.completed .pin-name{fill:var(--green2)}

.pulse-ring{
  fill:none;stroke:var(--red);stroke-width:1.5;
  animation:pulseA 2.4s ease-out infinite;
  opacity:0;
}
.pulse-ring.go{animation:pulseA 2.4s ease-out infinite}
@keyframes pulseA{
  0%{r:14px;opacity:.7}60%{r:24px;opacity:0}100%{r:24px;opacity:0}
}

/* ───── SIDEBAR ───── */
#sidebar{
  width:64px;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0 12px;gap:5px;
  overflow-y:auto;flex-shrink:0;z-index:50;
}
.side-lbl{
  font-size:7.5px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);width:100%;text-align:center;
  margin-bottom:2px;padding:0 4px;
}
.side-btn{
  width:48px;height:52px;border-radius:9px;
  border:1.5px solid var(--border);
  background:var(--surface2);
  color:var(--muted);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;transition:all .2s;flex-shrink:0;position:relative;
}
.side-btn .sb-icon{font-size:18px;line-height:1}
.side-btn .sb-num{font-size:8px;font-weight:700;letter-spacing:.5px;line-height:1}
.side-btn:hover{border-color:var(--gold);background:#2a2315;color:var(--gold)}
.side-btn.active{border-color:var(--red2);background:#2a0d08;color:var(--red2)}
.side-btn.done-btn{border-color:var(--green2);background:#0a180f;color:var(--green2)}
.side-btn.done-btn::after{
  content:'✓';position:absolute;top:3px;right:5px;
  font-size:7px;color:var(--green2);font-weight:700;
}

/* ───── BOTTOM SHEET ───── */
#sheet{
  position:absolute;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  border-radius:18px 18px 0 0;
  transform:translateY(100%);
  transition:transform .38s cubic-bezier(.32,0,.2,1);
  z-index:300;
  max-height:75dvh;
  display:flex;flex-direction:column;
  box-shadow:0 -12px 48px rgba(0,0,0,.5);
}
#sheet.open{transform:translateY(0)}

.sheet-handle{
  width:36px;height:4px;background:var(--border);border-radius:2px;
  margin:10px auto 0;flex-shrink:0;
}
#sheetHead{
  padding:10px 16px 10px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;gap:12px;flex-shrink:0;
}
#sheetEmoji{font-size:28px;line-height:1;margin-top:2px}
.sh-meta{flex:1}
#sheetNum{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
#sheetTitle{
  font-family:'Noto Serif TC',serif;font-size:19px;font-weight:900;
  color:var(--cream);line-height:1.15;
}
#sheetEn{
  font-family:'DM Serif Display',serif;font-style:italic;
  font-size:11px;color:var(--muted);margin-top:2px;
}
#sheetClose{
  background:none;border:none;color:var(--muted);font-size:20px;
  cursor:pointer;padding:0 2px;line-height:1;align-self:flex-start;
}

#sheetBody{padding:14px 16px 28px;overflow-y:auto;flex:1}

.section-head{
  font-size:9px;letter-spacing:2.5px;text-transform:uppercase;
  color:var(--red);font-weight:700;
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.section-head::after{content:'';flex:1;height:1px;background:var(--border)}
.section-text{font-size:13px;line-height:1.85;color:#b0a898;margin-bottom:16px}

.tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.tag{
  font-size:10px;padding:3px 9px;border-radius:20px;
  border:1px solid var(--border);color:var(--muted);
}

.task-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:11px;padding:12px 13px;margin-bottom:8px;
}
.tc-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  gap:8px;margin-bottom:6px;
}
.tc-title{
  font-family:'Noto Serif TC',serif;font-size:13px;font-weight:700;
  color:var(--cream);line-height:1.35;flex:1;
}
.tc-badge{
  font-size:9px;padding:2px 8px;border-radius:10px;white-space:nowrap;
  background:var(--red);color:#fff;flex-shrink:0;margin-top:2px;
}
.tc-badge.mission{background:var(--gold);color:#1a0f00}
.tc-badge.final{background:var(--green);color:#fff}
.tc-body{font-size:12.5px;line-height:1.75;color:#8a8070}

.done-btn-wrap{margin-top:18px}
.btn-complete{
  width:100%;padding:13px;border:none;border-radius:11px;
  background:var(--red);color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:all .2s;
}
.btn-complete:hover{background:#b82e18}
.btn-complete.completed{background:var(--green);cursor:default}

/* map hint toast */
#toast{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(14,11,7,.88);color:var(--text);
  font-size:11.5px;padding:7px 16px;border-radius:20px;
  border:1px solid var(--border);
  pointer-events:none;z-index:200;white-space:nowrap;
  transition:opacity .3s;
}
#toast.fade{opacity:0}

@media(min-width:480px){
  #sidebar{width:72px}
  .side-btn{width:54px;height:56px}
  .side-btn .sb-icon{font-size:20px}
}
</style>
</head>
<body>

<!-- ═══ SPLASH ═══ -->
<div id="splash">
  <div class="splash-eyebrow">香港中西區 · 城市尋跡</div>
  <div class="splash-title">人口<em>&</em>政策<br>探索之旅</div>
  <div class="splash-sub">Population & Policy Trail<br>Central → Sai Ying Pun</div>
  <div class="splash-stats">
    <div class="stat"><span class="stat-val">6</span><span class="stat-lbl">站點</span></div>
    <div class="stat"><span class="stat-val">2–3h</span><span class="stat-lbl">時長</span></div>
    <div class="stat"><span class="stat-val">~3km</span><span class="stat-lbl">步行</span></div>
  </div>
  <p class="splash-desc">從中環大館出發，途經文武廟、西港城、上環唐樓群、東華醫院，抵達西營盤中山紀念公園。沿途以人口學與政策視角，解讀香港開埠至今的移民、居住與社會演變。</p>
  <button class="btn-start" onclick="startApp()">開始探索 →</button>
</div>

<!-- ═══ APP ═══ -->
<div id="app" style="display:none">
  <div id="header">
    <div class="hdr-left">
      <h1>中西區人口探索之旅</h1>
      <p>HK CENTRAL & SAI YING PUN · POPULATION TRAIL</p>
    </div>
    <div id="progressPill">0 / 6</div>
  </div>

  <div id="body">
    <!-- MAP -->
    <div id="mapWrap">
      <div id="toast">👈 點擊右側站點編號開始</div>

      <svg id="mapSvg" viewBox="0 0 720 540" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnCoordinates">
            <circle cx="1" cy="1" r="0.8" fill="#1e1a14" opacity="0.6"/>
          </pattern>
          <linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#0a2030"/>
            <stop offset="100%" stop-color="#071520"/>
          </linearGradient>
          <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#181410"/>
            <stop offset="100%" stop-color="#0e0b07"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feComposite in="SourceGraphic" in2="blur" operator="over"/>
          </filter>
        </defs>

        <!-- Base land -->
        <rect width="720" height="540" fill="#0e0b07"/>
        <rect width="720" height="540" fill="url(#dots)" opacity="0.5"/>

        <!-- Hills (north) -->
        <ellipse cx="150" cy="80" rx="180" ry="120" fill="url(#hillGrad)" opacity="0.7"/>
        <ellipse cx="540" cy="65" rx="210" ry="130" fill="url(#hillGrad)" opacity="0.7"/>
        <text x="148" y="75" text-anchor="middle" class="area-label" font-size="9" fill="#2e2820">太平山</text>
        <text x="537" y="60" text-anchor="middle" class="area-label" font-size="9" fill="#2e2820">西高山</text>

        <!-- Water (south) -->
        <rect x="0" y="420" width="720" height="120" fill="url(#waterGrad)"/>
        <!-- subtle water ripples -->
        <path d="M60 445 Q180 438 300 445 Q420 452 540 445 Q630 440 690 445" stroke="#0d2535" stroke-width="1" fill="none" opacity=".5"/>
        <path d="M40 462 Q200 455 360 462 Q520 469 680 462" stroke="#0d2535" stroke-width="1" fill="none" opacity=".4"/>
        <path d="M80 480 Q240 473 400 480 Q560 487 680 480" stroke="#0d2535" stroke-width="1" fill="none" opacity=".3"/>
        <text x="360" y="488" text-anchor="middle" class="water-label" fill="#1a3a50">Victoria Harbour</text>
        <text x="360" y="505" text-anchor="middle" fill="#1a3a50" font-size="10" font-family="Noto Sans TC" font-weight="300">維多利亞港</text>

        <!-- City block texture -->
        <!-- Central blocks -->
        <rect x="155" y="300" width="25" height="35" rx="2" fill="#161210" stroke="#1e1a14" stroke-width="1"/>
        <rect x="183" y="308" width="18" height="27" rx="2" fill="#161210" stroke="#1e1a14" stroke-width="1"/>
        <rect x="155" y="338" width="22" height="18" rx="2" fill="#141210" stroke="#1e1a14" stroke-width="1"/>
        <!-- Sheung Wan blocks -->
        <rect x="368" y="290" width="22" height="30" rx="2" fill="#161210" stroke="#1e1a14" stroke-width="1"/>
        <rect x="393" y="295" width="16" height="25" rx="2" fill="#161210" stroke="#1e1a14" stroke-width="1"/>
        <!-- Western blocks -->
        <rect x="570" y="282" width="20" height="25" rx="2" fill="#161210" stroke="#1e1a14" stroke-width="1"/>
        <rect x="593" y="286" width="15" height="21" rx="2" fill="#161210" stroke="#1e1a14" stroke-width="1"/>

        <!-- Roads -->
        <!-- Queen's Road (main) -->
        <path d="M30 310 Q180 300 310 294 Q430 288 560 283 Q650 279 710 276"
          stroke="#1e1a14" stroke-width="12" fill="none" stroke-linecap="round"/>
        <path d="M30 310 Q180 300 310 294 Q430 288 560 283 Q650 279 710 276"
          stroke="#252015" stroke-width="1" fill="none"/>
        <text x="370" y="282" text-anchor="middle" class="road-label">皇后大道 Queen's Road</text>

        <!-- Des Voeux Road -->
        <path d="M55 368 Q220 360 360 356 Q490 353 630 350 Q680 349 710 348"
          stroke="#1e1a14" stroke-width="8" fill="none"/>
        <text x="380" y="344" text-anchor="middle" class="road-label">德輔道 Des Voeux Road</text>

        <!-- Bonham Road (upper) -->
        <path d="M30 258 Q120 250 215 245 Q330 238 450 235 Q560 233 660 236 Q690 238 710 240"
          stroke="#181510" stroke-width="5" fill="none" stroke-dasharray="4,3"/>
        <text x="370" y="230" text-anchor="middle" class="road-label">般咸道 Bonham Road</text>

        <!-- Vertical streets -->
        <line x1="210" y1="215" x2="210" y2="400" stroke="#1e1a14" stroke-width="4"/>
        <line x1="315" y1="217" x2="315" y2="403" stroke="#1e1a14" stroke-width="4"/>
        <line x1="435" y1="218" x2="435" y2="405" stroke="#1e1a14" stroke-width="4"/>
        <line x1="560" y1="220" x2="560" y2="410" stroke="#1e1a14" stroke-width="4"/>
        <line x1="655" y1="222" x2="655" y2="413" stroke="#1e1a14" stroke-width="4"/>

        <!-- Tram line -->
        <path d="M65 382 Q330 374 590 370 Q650 369 710 368"
          class="tram-line"/>
        <text x="130" y="369" fill="#2a4a2a" font-size="7.5" font-family="Noto Sans TC">🚃 電車</text>

        <!-- MTR -->
        <rect x="200" y="394" width="30" height="13" rx="3" fill="#5a0000" opacity=".8"/>
        <text x="215" y="403" text-anchor="middle" fill="#ff9980" font-size="6.5" font-family="Noto Sans TC">中環</text>
        <rect x="426" y="392" width="34" height="13" rx="3" fill="#5a0000" opacity=".8"/>
        <text x="443" y="401" text-anchor="middle" fill="#ff9980" font-size="6.5" font-family="Noto Sans TC">上環</text>
        <rect x="647" y="390" width="40" height="13" rx="3" fill="#5a0000" opacity=".8"/>
        <text x="667" y="399" text-anchor="middle" fill="#ff9980" font-size="6.5" font-family="Noto Sans TC">西營盤</text>

        <!-- Area labels -->
        <text x="210" y="203" text-anchor="middle" class="area-label">中環</text>
        <text x="210" y="215" text-anchor="middle" class="area-label-en">Central</text>
        <text x="490" y="201" text-anchor="middle" class="area-label">上環</text>
        <text x="490" y="213" text-anchor="middle" class="area-label-en">Sheung Wan</text>
        <text x="670" y="200" text-anchor="middle" class="area-label">西營盤</text>
        <text x="670" y="212" text-anchor="middle" class="area-label-en">Sai Ying Pun</text>

        <!-- Trail path -->
        <path d="M210 322 L315 316 L435 309 L560 304 L640 298 L675 295"
          class="trail-path"/>

        <!-- Compass rose -->
        <g transform="translate(686,38)">
          <circle cx="0" cy="0" r="16" fill="#141008" stroke="#252015" stroke-width="1.5"/>
          <text x="0" y="-6" text-anchor="middle" fill="#d4341a" font-size="8" font-weight="700">N</text>
          <line x1="0" y1="-4" x2="0" y2="-12" stroke="#d4341a" stroke-width="1.5"/>
          <text x="0" y="12" text-anchor="middle" fill="#4a4030" font-size="7">S</text>
          <text x="-11" y="4" text-anchor="middle" fill="#4a4030" font-size="7">W</text>
          <text x="11" y="4" text-anchor="middle" fill="#4a4030" font-size="7">E</text>
        </g>
        <!-- Scale -->
        <g transform="translate(22,415)">
          <line x1="0" y1="0" x2="52" y2="0" stroke="#3a3020" stroke-width="1.5"/>
          <line x1="0" y1="-3" x2="0" y2="3" stroke="#3a3020" stroke-width="1.5"/>
          <line x1="52" y1="-3" x2="52" y2="3" stroke="#3a3020" stroke-width="1.5"/>
          <text x="26" y="-5" text-anchor="middle" fill="#3a3020" font-size="7">500m</text>
        </g>

        <!-- ── MARKERS ── -->
        <!-- 0: 大館 x=210, y=322 -->
        <g class="pin-group" id="pin0" onclick="pinClick(0)">
          <circle class="pulse-ring" id="pr0" cx="210" cy="322" r="14"/>
          <circle class="pin-dot" cx="210" cy="322" r="15"/>
          <circle class="pin-ring" cx="210" cy="322" r="15"/>
          <text class="pin-emoji" x="210" y="322">⚖️</text>
          <text class="pin-name" x="210" y="342">大館</text>
        </g>
        <!-- 1: 文武廟 x=315, y=316 -->
        <g class="pin-group" id="pin1" onclick="pinClick(1)">
          <circle class="pulse-ring" id="pr1" cx="315" cy="316" r="14"/>
          <circle class="pin-dot" cx="315" cy="316" r="15"/>
          <circle class="pin-ring" cx="315" cy="316" r="15"/>
          <text class="pin-emoji" x="315" y="316">🛕</text>
          <text class="pin-name" x="315" y="336">文武廟</text>
        </g>

let completed = new Set();
let active = -1;

function startApp(){
  document.getElementById('splash').classList.add('out');
  setTimeout(()=>{
    document.getElementById('splash').style.display='none';
    document.getElementById('app').style.display='flex';
    // pulse first pin
    document.getElementById('pr0').classList.add('go');
  },620);
}

function updateProgress(){
  const p = document.getElementById('progressPill');
  p.textContent = completed.size + ' / 6';
  if(completed.size===6){p.classList.add('done')}
}

function setSideActive(idx){
  for(let i=0;i<6;i++){
    const b = document.getElementById('sb'+i);
    b.classList.remove('active');
    if(completed.has(i)) b.classList.add('done-btn');
    else b.classList.remove('done-btn');
  }
  if(idx>=0) document.getElementById('sb'+idx).classList.add('active');
}

function setPinActive(idx){
  for(let i=0;i<6;i++){
    const g = document.getElementById('pin'+i);
    g.classList.remove('active');
    if(completed.has(i)) g.classList.add('completed');
    else g.classList.remove('completed');
    document.getElementById('pr'+i).classList.remove('go');
  }
  if(idx>=0){
    document.getElementById('pin'+idx).classList.add('active');
    document.getElementById('pr'+idx).classList.add('go');
  }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('fade');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.add('fade'), 3000);
}

function sideClick(idx){
  active = idx;
  setSideActive(idx);
  setPinActive(idx);
  showToast('👆 已選：' + LOCS[idx].title);
  openSheet(idx);
}

function pinClick(idx){
  active = idx;
  setSideActive(idx);
  setPinActive(idx);
  openSheet(idx);
}

function openSheet(idx){
  const loc = LOCS[idx];
  const isDone = completed.has(idx);

  document.getElementById('sheetEmoji').textContent = loc.emoji;
  document.getElementById('sheetNum').textContent = loc.num;
  document.getElementById('sheetTitle').textContent = loc.title;
  document.getElementById('sheetEn').textContent = loc.en;

  let html = '';
  // Background
  html += `<div class="section-head">地點介紹</div>`;
  html += `<p class="section-text">${loc.bg}</p>`;
  // Policy
  html += `<div class="section-head">人口與政策分析</div>`;
  html += `<p class="section-text">${loc.policy}</p>`;
  html += `<div class="tags">`;
  loc.tags.forEach(t=>{ html += `<span class="tag">${t}</span>`; });
  html += `</div>`;
  // Tasks
  html += `<div class="section-head">站點任務</div>`;
  loc.tasks.forEach(task=>{
    const bodyLines = task.body.replace(/\n/g,'<br>');
    html += `<div class="task-card">
      <div class="tc-head">
        <div class="tc-title">${task.title}</div>
        <span class="tc-badge ${task.cls}">${task.badge}</span>
      </div>
      <div class="tc-body">${bodyLines}</div>
    </div>`;
  });
  // Complete button
  html += `<div class="done-btn-wrap">
    <button class="btn-complete ${isDone?'completed':''}" id="doneBtn" onclick="markDone(${idx})">
      ${isDone ? '✓ 已完成此站點' : '✅ 完成此站點，前往下一站'}
    </button>
  </div>`;

  document.getElementById('sheetBody').innerHTML = html;
  document.getElementById('sheet').classList.add('open');
}

function closeSheet(){
  document.getElementById('sheet').classList.remove('open');
}

function markDone(idx){
  completed.add(idx);
  const btn = document.getElementById('doneBtn');
  if(btn){ btn.textContent='✓ 已完成此站點'; btn.classList.add('completed'); }
  // Update markers & sidebar
  setPinActive(-1);
  setSideActive(-1);
  updateProgress();

  if(idx < 5){
    setTimeout(()=>{
      closeSheet();
      setTimeout(()=> sideClick(idx+1), 450);
    }, 900);
  } else {
    // All done
    setTimeout(()=>{
      closeSheet();
      const t = document.getElementById('toast');
      t.style.background='rgba(45,122,74,.92)';
      t.style.borderColor='#2d7a4a';
      showToast('🎉 恭喜完成全部六個站點！');
    }, 900);
  }
}

// allow swiping sheet down to close
(function(){
  let startY=0, sh;
  document.addEventListener('touchstart',e=>{
    sh=document.getElementById('sheet');
    if(sh.classList.contains('open')) startY=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!sh||!sh.classList.contains('open')) return;
    const dy = e.changedTouches[0].clientY - startY;
    if(dy > 70) closeSheet();
  },{passive:true});
})();
</script>
