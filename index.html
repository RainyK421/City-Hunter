<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中西區人口尋跡</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0e0b07;--surface:#1a1510;--surface2:#22201a;--border:#2e2920;
  --red:#d4341a;--red2:#ff5a3c;--gold:#c9972a;--gold2:#f0c050;
  --cream:#f0ead8;--muted:#7a6e5c;--text:#e8e0cc;
  --green:#2d7a4a;--green2:#4aad6e;--wx:#07c160;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:'Noto Sans TC',sans-serif}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:28px 24px;text-align:center;overflow-y:auto;
  transition:opacity .5s,transform .5s}
#splash.out{opacity:0;transform:scale(1.04);pointer-events:none}
.sp-eye{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);
  margin-bottom:16px;border:1px solid rgba(201,151,42,.3);padding:5px 14px;border-radius:20px}
.sp-title{font-family:'DM Serif Display',serif;font-size:clamp(26px,8vw,40px);
  line-height:1.15;color:var(--cream);margin-bottom:4px}
.sp-title em{font-style:italic;color:var(--gold2)}
.sp-sub{font-family:'Noto Serif TC',serif;font-size:clamp(13px,3.5vw,17px);
  color:var(--muted);margin-bottom:22px;line-height:1.5}
.sp-stats{display:flex;gap:24px;justify-content:center;margin-bottom:22px}
.sp-stat{display:flex;flex-direction:column;align-items:center;gap:3px}
.sp-stat .v{font-family:'DM Serif Display',serif;font-size:26px;color:var(--cream)}
.sp-stat .l{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.sp-desc{max-width:340px;font-size:12.5px;line-height:1.85;color:var(--muted);margin-bottom:24px}
.sp-lang{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.lang-btn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);
  border-radius:8px;padding:7px 16px;font-size:13px;cursor:pointer;transition:all .2s;
  font-family:'Noto Sans TC',sans-serif}
.lang-btn.on,.lang-btn:hover{border-color:var(--gold);color:var(--gold);background:#1e1a10}
.btn-start{background:var(--red);color:#fff;border:none;border-radius:12px;
  padding:14px 44px;font-family:'Noto Serif TC',serif;font-size:16px;font-weight:700;
  letter-spacing:2px;cursor:pointer;box-shadow:0 0 28px rgba(212,52,26,.4);transition:all .2s}
.btn-start:active{transform:scale(.97)}

/* ── APP ── */
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
#hdr{flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);
  padding:8px 12px;display:flex;align-items:center;justify-content:space-between;z-index:100;
  gap:8px}
.hdr-left{flex:1;min-width:0}
.hdr-left h1{font-family:'Noto Serif TC',serif;font-size:12.5px;font-weight:700;
  color:var(--cream);letter-spacing:1px;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-left p{font-size:8px;color:var(--muted);letter-spacing:.8px;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
#progPill{background:var(--red);color:#fff;font-size:11px;font-weight:700;
  padding:3px 10px;border-radius:20px;white-space:nowrap;transition:background .4s;letter-spacing:.5px}
#progPill.done{background:var(--green)}
.hl-wrap{display:flex;gap:3px}
.hl-btn{background:none;border:1px solid var(--border);color:var(--muted);
  border-radius:6px;padding:3px 7px;font-size:10px;cursor:pointer;transition:all .2s;
  font-family:'Noto Sans TC',sans-serif;white-space:nowrap}
.hl-btn.on{border-color:var(--gold);color:var(--gold)}

/* ── BODY ── */
#body{flex:1;display:flex;overflow:hidden;position:relative}

/* ── MAP ── */
#mapWrap{flex:1;position:relative;overflow:hidden}
#mapSvg{width:100%;height:100%;display:block}
.rd-lbl{fill:#3a3020;font-size:7px;font-family:'Noto Sans TC',sans-serif}
.area-lbl{fill:#2e2618;font-size:10px;font-family:'Noto Serif TC',serif;font-weight:700}
.area-en{fill:#2e2618;font-size:8px;font-family:'DM Serif Display',serif;font-style:italic}
.water-lbl{fill:#1a3a50;font-size:10px;font-family:'DM Serif Display',serif;font-style:italic}
.trail{stroke:var(--red);stroke-width:2.2;fill:none;stroke-dasharray:7,5;opacity:.55;
  animation:dash 18s linear infinite}
@keyframes dash{to{stroke-dashoffset:-200}}
.pin-g{cursor:pointer}
.p-ring{fill:none;stroke:var(--muted);stroke-width:1.5;transition:stroke .2s}
.p-dot{fill:var(--surface2);transition:fill .2s}
.p-emoji{font-size:13px;dominant-baseline:central;text-anchor:middle;user-select:none}
.p-name{fill:var(--muted);font-size:7.5px;font-family:'Noto Sans TC',sans-serif;font-weight:500;text-anchor:middle;transition:fill .2s}
.pin-g:hover .p-ring,.pin-g.active .p-ring{stroke:var(--red2)}
.pin-g:hover .p-dot,.pin-g.active .p-dot{fill:#1e0e06}
.pin-g:hover .p-name,.pin-g.active .p-name{fill:var(--cream)}
.pin-g.cmp .p-ring{stroke:var(--green2)}
.pin-g.cmp .p-dot{fill:#081408}
.pin-g.cmp .p-name{fill:var(--green2)}
.pr{fill:none;stroke:var(--red);stroke-width:1.5;opacity:0;
  animation:pA 2.4s ease-out infinite;animation-play-state:paused}
.pr.go{animation-play-state:running}
@keyframes pA{0%{r:14;opacity:.65}65%{r:24;opacity:0}100%{r:24;opacity:0}}

/* ── SIDEBAR ── */
#sidebar{width:62px;background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:7px 0 10px;gap:4px;
  overflow-y:auto;flex-shrink:0;z-index:50}
.sb-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);
  width:100%;text-align:center;margin-bottom:1px}
.sb-btn{width:46px;height:50px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--muted);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;transition:all .2s;flex-shrink:0;position:relative;font-family:'Noto Sans TC',sans-serif}
.sb-btn .si{font-size:16px;line-height:1}
.sb-btn .sn{font-size:7.5px;font-weight:700;letter-spacing:.5px;line-height:1}
.sb-btn:hover{border-color:var(--gold);color:var(--gold);background:#201c10}
.sb-btn.active{border-color:var(--red2);background:#200a04;color:var(--red2)}
.sb-btn.cmp-b{border-color:var(--green2);background:#061008;color:var(--green2)}
.sb-btn.cmp-b::after{content:'✓';position:absolute;top:3px;right:4px;font-size:7px;color:var(--green2);font-weight:700}

/* ── BOTTOM SHEET ── */
#sheet{position:absolute;bottom:0;left:0;right:0;background:var(--surface);
  border-top:1px solid var(--border);border-radius:16px 16px 0 0;
  transform:translateY(100%);transition:transform .36s cubic-bezier(.32,0,.2,1);
  z-index:300;max-height:80dvh;display:flex;flex-direction:column;
  box-shadow:0 -10px 40px rgba(0,0,0,.55)}
#sheet.open{transform:translateY(0)}
.sh-handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:9px auto 0;flex-shrink:0}
#shHead{padding:10px 14px 9px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:11px;flex-shrink:0}
#shEmoji{font-size:26px;line-height:1;margin-top:2px}
.sh-meta{flex:1}
#shNum{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
#shTitle{font-family:'Noto Serif TC',serif;font-size:18px;font-weight:900;color:var(--cream);line-height:1.15}
#shEn{font-family:'DM Serif Display',serif;font-style:italic;font-size:10.5px;color:var(--muted);margin-top:2px}
#shClose{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0 2px;align-self:flex-start}
#shBody{padding:12px 14px 28px;overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}

/* sheet typography */
.sec-hd{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--red);
  font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:7px}
.sec-hd::after{content:'';flex:1;height:1px;background:var(--border)}
.sec-txt{font-size:12.5px;line-height:1.85;color:#a89880;margin-bottom:14px}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.tag{font-size:9.5px;padding:2px 8px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}

/* task card */
.tc{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;margin-bottom:10px}
.tc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:7px}
.tc-title{font-family:'Noto Serif TC',serif;font-size:12.5px;font-weight:700;color:var(--cream);line-height:1.35;flex:1}
.tc-badge{font-size:8.5px;padding:2px 7px;border-radius:10px;white-space:nowrap;background:var(--red);color:#fff;flex-shrink:0;margin-top:2px}
.tc-badge.m{background:var(--gold);color:#1a0f00}
.tc-badge.f{background:var(--green);color:#fff}
.tc-body{font-size:12px;line-height:1.75;color:#7a6e5c}

/* ── OBSERVATION BLOCK ── */
.obs-block{background:#0a0806;border:1px solid var(--border);border-radius:10px;margin-top:10px;overflow:hidden}
.obs-hd{display:flex;align-items:center;gap:6px;padding:9px 12px 7px;border-bottom:1px solid var(--border)}
.obs-hd-txt{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:700}

/* photo upload */
.photo-row{padding:10px 12px;border-bottom:1px solid var(--border)}
.photo-upload-btn{display:flex;align-items:center;gap:8px;background:var(--surface2);
  border:1.5px dashed var(--border);border-radius:8px;padding:10px 14px;
  color:var(--muted);font-size:12.5px;cursor:pointer;width:100%;transition:all .2s;
  font-family:'Noto Sans TC',sans-serif}
.photo-upload-btn:hover{border-color:var(--gold);color:var(--gold)}
.photo-upload-btn .pu-icon{font-size:20px}
input[type=file]{display:none}
.photo-preview-wrap{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photo-thumb{width:72px;height:72px;border-radius:6px;object-fit:cover;border:1px solid var(--border);position:relative}
.photo-thumb-wrap{position:relative;display:inline-block}
.photo-del{position:absolute;top:-5px;right:-5px;width:18px;height:18px;border-radius:50%;
  background:var(--red);color:#fff;border:none;font-size:10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;line-height:1}

/* text input */
.obs-txt-wrap{padding:8px 12px}
.obs-textarea{width:100%;background:transparent;border:none;color:var(--cream);
  font-size:13px;font-family:'Noto Sans TC',sans-serif;padding:4px 0 6px;
  resize:none;outline:none;line-height:1.65;min-height:68px}
.obs-textarea::placeholder{color:#3a3028}

/* share area */
.share-area{padding:4px 12px 12px;border-top:1px solid var(--border)}
.share-tip{font-size:10.5px;color:var(--muted);line-height:1.6;margin-bottom:10px;padding-top:8px}
.share-tip b{color:var(--gold)}
.share-btns{display:flex;gap:6px}
.sh-btn{flex:1;padding:10px 6px;border:none;border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;transition:all .2s;font-family:'Noto Sans TC',sans-serif;
  display:flex;align-items:center;justify-content:center;gap:5px}
.sh-wx{background:var(--wx);color:#fff}
.sh-wx:hover{background:#06ad56}
.sh-cp{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}
.sh-cp:hover{border-color:var(--gold);color:var(--gold)}
.cp-ok{font-size:10px;color:var(--green2);margin-top:6px;display:none}
.cp-ok.show{display:block}

/* complete btn */
.done-wrap{margin-top:16px}
.btn-done{width:100%;padding:13px;border:none;border-radius:10px;background:var(--red);
  color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:14px;font-weight:700;
  letter-spacing:1px;cursor:pointer;transition:all .2s}
.btn-done:hover{background:#b82e18}
.btn-done.cmp{background:var(--green);cursor:default}

/* toast */
#toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);
  background:rgba(14,11,7,.9);color:var(--text);font-size:11px;
  padding:6px 14px;border-radius:18px;border:1px solid var(--border);
  pointer-events:none;z-index:200;white-space:nowrap;transition:opacity .3s;
  max-width:calc(100% - 80px);text-align:center}
#toast.fade{opacity:0}

@media(min-width:480px){
  #sidebar{width:70px}
  .sb-btn{width:52px;height:54px}
  .sb-btn .si{font-size:18px}
}
</style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash">
  <div class="sp-eye" id="sp-eye">香港中西區 · 城市尋跡</div>
  <div class="sp-title">人口<em>&</em>政策<br>探索之旅</div>
  <div class="sp-sub" id="sp-sub">Population & Policy Trail<br>Central → Sai Ying Pun</div>
  <div class="sp-stats">
    <div class="sp-stat"><span class="v">6</span><span class="l" id="sp-s1">站點</span></div>
    <div class="sp-stat"><span class="v">2–3h</span><span class="l" id="sp-s2">時長</span></div>
    <div class="sp-stat"><span class="v">~3km</span><span class="l" id="sp-s3">步行</span></div>
  </div>
  <p class="sp-desc" id="sp-desc">從中環大館出發，途經文武廟、西港城、上環唐樓群、東華醫院，抵達西營盤中山紀念公園。以人口學與政策視角，解讀香港開埠至今的移民、居住與社會演變。</p>
  <div class="sp-lang">
    <button class="lang-btn on" onclick="setLang('zh')">繁體</button>
    <button class="lang-btn" onclick="setLang('yue')">廣東話</button>
    <button class="lang-btn" onclick="setLang('en')">English</button>
  </div>
  <button class="btn-start" id="sp-btn" onclick="startApp()">開始探索 →</button>
</div>

<!-- ══ APP ══ -->
<div id="app" style="display:none">
  <div id="hdr">
    <div class="hdr-left">
      <h1 id="hdr-t">中西區人口探索之旅</h1>
      <p id="hdr-s">HK CENTRAL & SAI YING PUN · POPULATION TRAIL</p>
    </div>
    <div class="hdr-right">
      <div class="hl-wrap">
        <button class="hl-btn on" onclick="setLang('zh')">繁</button>
        <button class="hl-btn" onclick="setLang('yue')">粵</button>
        <button class="hl-btn" onclick="setLang('en')">EN</button>
      </div>
      <div id="progPill">0 / 6</div>
    </div>
  </div>

  <div id="body">
    <!-- MAP -->
    <div id="mapWrap">
      <div id="toast">👈 點擊右側站點開始</div>

        <text x="535" y="61" text-anchor="middle" class="area-lbl" font-size="8.5" fill="#2a2218">西高山</text>

        <path d="M30 460 Q200 453 370 460 Q530 467 700 460" stroke="#0c2030" stroke-width=".9" fill="none" opacity=".35"/>
        <text x="360" y="483" text-anchor="middle" class="water-lbl">Victoria Harbour</text>
        <text x="360" y="500" text-anchor="middle" fill="#1a3a50" font-size="10" font-family="Noto Sans TC" font-weight="300">維多利亞港</text>
        <!-- buildings -->

        <rect x="590" y="284" width="14" height="20" rx="2" fill="#141010" stroke="#1e1a14" stroke-width="1"/>
        <!-- roads -->
        <path d="M28 308 Q178 298 308 292 Q428 286 558 281 Q648 277 712 274" stroke="#1e1a14" stroke-width="11" fill="none" stroke-linecap="round"/>
        <path d="M28 308 Q178 298 308 292 Q428 286 558 281 Q648 277 712 274" stroke="#252015" stroke-width="1" fill="none"/>
        <text x="368" y="280" text-anchor="middle" class="rd-lbl">皇后大道 Queen's Road</text>

        <line x1="208" y1="212" x2="208" y2="398" stroke="#1e1a14" stroke-width="4"/>

        <line x1="653" y1="220" x2="653" y2="410" stroke="#1e1a14" stroke-width="4"/>
        <path d="M62 380 Q328 372 590 368 Q648 367 712 366" stroke="#2a4a2a" stroke-width="2.5" fill="none" opacity=".75"/>
        <text x="128" y="367" fill="#2a4a2a" font-size="7" font-family="Noto Sans TC">🚃 電車</text>
        <rect x="198" y="392" width="30" height="12" rx="3" fill="#5a0000" opacity=".8"/>
        <text x="213" y="400.5" text-anchor="middle" fill="#ff9980" font-size="6" font-family="Noto Sans TC">中環</text>
        <rect x="424" y="390" width="34" height="12" rx="3" fill="#5a0000" opacity=".8"/>
        <text x="441" y="398.5" text-anchor="middle" fill="#ff9980" font-size="6" font-family="Noto Sans TC">上環</text>
        <rect x="645" y="388" width="40" height="12" rx="3" fill="#5a0000" opacity=".8"/>
        <text x="665" y="396.5" text-anchor="middle" fill="#ff9980" font-size="6" font-family="Noto Sans TC">西營盤</text>
        <text x="208" y="200" text-anchor="middle" class="area-lbl">中環</text>
        <text x="208" y="211" text-anchor="middle" class="area-en">Central</text>

let lang='zh', completed=new Set(), currentIdx=-1;

let obsData={};
function getObs(key){return obsData[key]||(obsData[key]={text:'',photos:[]});}

// ══════════════════════════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════════════════════════
function setLang(l){
  lang=l;
  // update all lang buttons
  document.querySelectorAll('.lang-btn,.hl-btn').forEach(b=>{
    const txt=b.textContent.trim();
    const isActive=(l==='zh'&&(txt==='繁體'||txt==='繁'))||(l==='yue'&&(txt==='廣東話'||txt==='粵'))||(l==='en'&&(txt==='English'||txt==='EN'));
    b.classList.toggle('on',isActive);
  });
  const t=T[l];
  // splash
  const sp=G('splash');
  if(sp&&!sp.classList.contains('out')){
    G('sp-eye').textContent=t.eye;
    G('sp-sub').innerHTML=t.sub.replace('\n','<br>');
    G('sp-s1').textContent=t.s1;G('sp-s2').textContent=t.s2;G('sp-s3').textContent=t.s3;
    G('sp-desc').textContent=t.desc;G('sp-btn').textContent=t.start;
  }
  // header
  if(G('hdr-t')){G('hdr-t').textContent=t.hdrT;G('hdr-s').textContent=t.hdrS;G('sb-lbl').textContent=t.sbLbl;}
  // pin names
  LOCS.forEach((_,i)=>{const e=G('pn'+i);if(e)e.textContent=t.pins[i];});
  showToast(t.toastStart);
  // re-render open sheet
  if(currentIdx>=0&&G('sheet').classList.contains('open')) openSheet(currentIdx);
}
const G=id=>document.getElementById(id);

// ══════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════
function startApp(){
  G('splash').classList.add('out');
  setTimeout(()=>{G('splash').style.display='none';G('app').style.display='flex';},550);
}

// ══════════════════════════════════════════════════════════
// MAP / SIDEBAR
// ══════════════════════════════════════════════════════════
function syncUI(idx){
  for(let i=0;i<6;i++){
    const pin=G('pin'+i),sb=G('sb'+i);
    pin.classList.toggle('active',i===idx);
    pin.classList.toggle('cmp',completed.has(i));
    sb.classList.toggle('active',i===idx);
    sb.classList.toggle('cmp-b',completed.has(i)&&i!==idx);
    pin.querySelectorAll('.pr').forEach(r=>r.classList.toggle('go',i===idx));
  }
}
function sideClick(idx){currentIdx=idx;syncUI(idx);showToast(T[lang].toastSel(LOCS[idx].title[lang]));openSheet(idx);}
function pinClick(idx){sideClick(idx);}

// ══════════════════════════════════════════════════════════
// SHEET
// ══════════════════════════════════════════════════════════
function openSheet(idx){
  const loc=LOCS[idx],t=T[lang],isDone=completed.has(idx);
  G('shEmoji').textContent=loc.emoji;
  G('shNum').textContent=loc.num[lang];
  G('shTitle').textContent=loc.title[lang];
  G('shEn').textContent=loc.ensub;

  let html='';
  html+=`<div class="sec-hd">${t.secBg}</div><p class="sec-txt">${loc.bg[lang]}</p>`;
  html+=`<div class="sec-hd">${t.secPol}</div><p class="sec-txt">${loc.policy[lang]}</p>`;
  html+=`<div class="tags">${loc.tags.map(tg=>`<span class="tag">${tg}</span>`).join('')}</div>`;
  html+=`<div class="sec-hd">${t.secTask}</div>`;

  loc.tasks.forEach((task,ti)=>{
    const bk=task.badge,bc=bk==='fin'||bk==='sum'?'f':bk==='obs'||bk==='ext'?'m':'';
    const bodyHtml=task.body[lang].replace(/\n/g,'<br>');
    html+=`<div class="tc">
      <div class="tc-top">
        <div class="tc-title">${task.title[lang]}</div>
        <span class="tc-badge ${bc}">${t.b[bk]}</span>
      </div>
      <div class="tc-body">${bodyHtml}</div>`;

    if(task.hasInput){
      const key=task.obsKey;
      const saved=getObs(key);
      html+=`<div class="obs-block">
        <div class="obs-hd"><span class="obs-hd-txt">${t.obsHd}</span></div>
        <div class="photo-row">
          <label class="photo-upload-btn" for="file_${key}">
            <span class="pu-icon">📷</span>
            <span id="pbtn_${key}">${saved.photos.length>0?t.photoBtn2:t.photoBtn}</span>
          </label>
          <input type="file" id="file_${key}" accept="image/*" capture="environment" multiple onchange="handlePhotos('${key}',this)">
          <div class="photo-preview-wrap" id="prev_${key}">
            ${saved.photos.map((p,pi)=>`<div class="photo-thumb-wrap">
              <img class="photo-thumb" src="${p}">
              <button class="photo-del" onclick="delPhoto('${key}',${pi})">✕</button>
            </div>`).join('')}
          </div>
        </div>
        <div class="obs-txt-wrap">
          <textarea class="obs-textarea" id="txt_${key}" placeholder="${t.txtPh}" onchange="obsData['${key}'].text=this.value">${saved.text}</textarea>
        </div>
        <div class="share-area">
          <p class="share-tip">💡 <b>${t.shareTip}</b></p>
          <div class="share-btns">
            <button class="sh-btn sh-wx" onclick="copyForWX('${key}','${idx}','${ti}')">💬 ${t.wxBtn}</button>
          </div>
          <div class="cp-ok" id="cpok_${key}">${t.cpOk}</div>
        </div>
      </div>`;
    }
    html+=`</div>`;
  });

  html+=`<div class="done-wrap"><button class="btn-done ${isDone?'cmp':''}" id="doneBtn" onclick="markDone(${idx})">${isDone?t.doneDone:t.doneBtn}</button></div>`;
  G('shBody').innerHTML=html;
  G('sheet').classList.add('open');
}

function closeSheet(){
  // save textarea values
  document.querySelectorAll('.obs-textarea').forEach(el=>{
    const key=el.id.replace('txt_','');
    if(obsData[key]) obsData[key].text=el.value;
  });
  G('sheet').classList.remove('open');
}

// ══════════════════════════════════════════════════════════
// PHOTOS
// ══════════════════════════════════════════════════════════
function handlePhotos(key,input){
  const obs=getObs(key);
  const files=[...input.files];
  let loaded=0;
  files.forEach(file=>{
    const reader=new FileReader();
    reader.onload=e=>{
      obs.photos.push(e.target.result);
      loaded++;
      if(loaded===files.length) renderPhotos(key);
    };
    reader.readAsDataURL(file);
  });
  input.value='';
}

function renderPhotos(key){
  const obs=getObs(key);
  const wrap=G('prev_'+key);
  if(!wrap)return;
  wrap.innerHTML=obs.photos.map((p,pi)=>`<div class="photo-thumb-wrap">
    <img class="photo-thumb" src="${p}">
    <button class="photo-del" onclick="delPhoto('${key}',${pi})">✕</button>
  </div>`).join('');
  const pbtn=G('pbtn_'+key);
  if(pbtn)pbtn.textContent=obs.photos.length>0?T[lang].photoBtn2:T[lang].photoBtn;
}

function delPhoto(key,idx){
  getObs(key).photos.splice(idx,1);
  renderPhotos(key);
}

// ══════════════════════════════════════════════════════════
// SHARE / COPY
// ══════════════════════════════════════════════════════════
function copyForWX(key,locIdx,taskIdx){
  const obs=getObs(key);
  // sync textarea
  const ta=G('txt_'+key);
  if(ta) obs.text=ta.value;

  const loc=LOCS[locIdx];
  const task=loc.tasks[taskIdx];
  const t=T[lang];
  const divider='─'.repeat(20);
  const photoNote=obs.photos.length>0?`\n📷 附圖 ${obs.photos.length} 張（請另行轉發圖片）`:'';
  const text=`【中西區人口探索之旅】\n📍 ${loc.title[lang]}　${loc.num[lang]}\n${task.title[lang]}\n${divider}\n${obs.text.trim()||'（未填寫）'}${photoNote}\n${divider}\n#人口政策探索 #中西區尋跡`;

  navigator.clipboard.writeText(text)
    .then(()=>showCpOk(key))
    .catch(()=>{
      // fallback
      const el=document.createElement('textarea');
      el.value=text;el.style.position='fixed';el.style.opacity='0';
      document.body.appendChild(el);el.focus();el.select();
      try{document.execCommand('copy');}catch(e){}
      document.body.removeChild(el);
      showCpOk(key);
    });
}

function showCpOk(key){
  const el=G('cpok_'+key);
  if(!el)return;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3500);
}

// ══════════════════════════════════════════════════════════
// COMPLETE
// ══════════════════════════════════════════════════════════
function markDone(idx){
  completed.add(idx);
  const btn=G('doneBtn');
  if(btn){btn.textContent=T[lang].doneDone;btn.classList.add('cmp');}
  syncUI(-1);
  G('progPill').textContent=`${completed.size} / 6`;
  if(completed.size===6)G('progPill').classList.add('done');
  if(idx<5){setTimeout(()=>{closeSheet();setTimeout(()=>sideClick(idx+1),420);},900);}
  else{setTimeout(()=>{closeSheet();const t=G('toast');t.style.background='rgba(45,122,74,.9)';showToast(T[lang].toastDone);},900);}
}

// ══════════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════════
let _tt;
function showToast(msg){
  const t=G('toast');t.textContent=msg;t.classList.remove('fade');
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.add('fade'),3500);
}

// swipe down to close
let _sy=0;
document.addEventListener('touchstart',e=>{_sy=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',e=>{
  if(!G('sheet').classList.contains('open'))return;
  if(e.changedTouches[0].clientY-_sy>65)closeSheet();
},{passive:true});

setLang('zh');
</script>
</body>
</html>
